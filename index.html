      "台東縣": ["台東市", "綠島鄉", "蘭嶼鄉", "延平鄉", "卑南鄉", "鹿野鄉", "關山鎮", "海端鄉", "池上鄉", "東河鄉", "成功鎮", "長濱鄉", "太麻里鄉", "金峰鄉", "大武鄉", "達仁鄉"],
      "澎湖縣": ["馬公市", "西嶼鄉", "望安鄉", "七美鄉", "白沙鄉", "湖西鄉"],
      "金門縣": ["金沙鎮", "金湖鎮", "金寧鄉", "金城鎮", "烈嶼鄉", "烏坵鄉"],
      "連江縣": ["南竿鄉", "北竿鄉", "莒光鄉", "東引鄉"]
    };

    let progressInterval;
    function updateProgressBar(targetWidth) {
      const bar = document.getElementById('fakeProgressBar');
      if (bar) bar.style.width = targetWidth + '%';
    }

    window.onload = function() {
      loadTotalSearches();
      const randomAdIndex = Math.floor(Math.random() * adBanners.length);
      document.getElementById('bottomAd').innerHTML = adBanners[randomAdIndex];
      document.getElementById('bottomAd').style.display = 'block';

      const citySelect = document.getElementById('cityInput');
      for (let city in taiwanData) {
        let option = document.createElement('option');
        option.value = city;
        option.text = city;
        citySelect.appendChild(option);
      }

      if (isLineApp) {
        const warning = document.createElement('div');
        warning.className = 'alert alert-danger text-center mb-3 shadow-sm';
        warning.style.borderRadius = '12px';
        warning.innerHTML = '<strong>⚠️ 偵測到 LINE 內建瀏覽器</strong><br>定位功能將受到限制。請點擊螢幕角落的選單，選擇<strong>「以預設瀏覽器開啟」</strong> (Safari/Chrome) 以獲得最佳體驗！';
        const container = document.querySelector('.container');
        const title = container.querySelector('h2');
        title.insertAdjacentElement('afterend', warning);
      }
    };

    async function loadTotalSearches() {
      try {
        const cleanLogUrl = GAS_API_URL_LOG.replace(/\s+/g, '');
        if (cleanLogUrl.includes('請貼上')) return;
        const response = await fetch(cleanLogUrl, {
          method: 'POST',
          body: JSON.stringify({ action: 'getStats' })
        });
        const result = await response.json();
        if (result.status === 'success' && result.totalSearches > 0) {
          document.getElementById('totalSearchCount').innerText = result.totalSearches.toLocaleString();
        }
      } catch (err) {
        console.log('統計數據讀取失敗', err); 
      }
    }

    function updateDistricts() {
      const city = document.getElementById('cityInput').value;
      const districtSelect = document.getElementById('districtInput');
      districtSelect.innerHTML = '<option value="">選擇鄉鎮市區</option>';
      if (taiwanData[city]) {
        taiwanData[city].forEach(district => {
          let option = document.createElement('option');
          option.value = district;
          option.text = district;
          districtSelect.appendChild(option);
        });
      }
    }

    function toggleUI(isProcessing) {
      document.getElementById('searchBtn').disabled = isProcessing;
      document.getElementById('gpsBtn').disabled = isProcessing;
      const loader = document.getElementById('loader');
      
      if(isProcessing) {
        loader.style.display = 'block';
        document.getElementById('results').innerHTML = '';
        document.getElementById('bottomAd').style.display = 'none'; 
        
        let currentWidth = 0;
        updateProgressBar(0);
        
        setTimeout(() => { 
          currentWidth = 70;
          updateProgressBar(currentWidth);
        }, 100);

        progressInterval = setInterval(() => {
          if (currentWidth < 95) {
            currentWidth += Math.random() * 2;
            updateProgressBar(currentWidth);
          }
        }, 500);

      } else {
        clearInterval(progressInterval);
        updateProgressBar(100);
        setTimeout(() => {
          loader.style.display = 'none';
        }, 300);
      }
    }

    async function callBackendAPI(inputData) {
      try {
        const cleanSearchUrl = GAS_API_URL_SEARCH.replace(/\s+/g, '');
        const cleanLogUrl = GAS_API_URL_LOG.replace(/\s+/g, '');
        if (cleanSearchUrl.includes('請貼上')) throw new Error('請在程式碼填入專案 A 的網址。');

        const response = await fetch(cleanSearchUrl, {
          method: 'POST',
          body: JSON.stringify({ inputData: inputData })
        });
        const result = await response.json();
        if (result.status === 'success') {
          showResults(result.data);
          if (!cleanLogUrl.includes('請貼上') && result.data.length > 0) {
            const searchType = (typeof inputData === 'string') ? '文字搜尋' : 'GPS定位';
            fetch(cleanLogUrl, {
              method: 'POST',
              body: JSON.stringify({ 
                action: 'logSearch', 
                address: result.data[0].address,
                searchType: searchType 
              })
            }).catch(err => console.log('背景寫入日誌失敗:', err));
          }
        } else {
          throw new Error(result.message);
        }
      } catch (err) {
        toggleUI(false);
        let errorMsg = err.message;
        if (errorMsg.includes('解析地址')) {
            errorMsg = '🔎 找不到這個地址，請確認輸入是否正確！';
        }
        document.getElementById('results').innerHTML = `
          <div class="alert alert-warning text-center shadow-sm" style="border-radius: 16px; padding: 30px;">
            <div style="font-size: 3rem; margin-bottom: 10px;">🤔</div>
            <h5 class="fw-bold">${errorMsg}</h5>
            <p class="text-secondary small mb-0">建議檢查縣市、區域及門牌號碼是否填寫完整。</p>
          </div>
        `;
        document.getElementById('bottomAd').style.display = 'block'; 
      }
    }

    function startSearchText() {
      const city = document.getElementById('cityInput').value;
      const district = document.getElementById('districtInput').value;
      const detail = document.getElementById('detailInput').value.trim();
      if (!city || !district || !detail) return alert('請完整填寫地址資訊喔！');
      if (!detail.includes('號')) return alert('詳細地址請務必包含門牌號碼 (例如：ＯＯ路ＸＸ號)！');
      const fullAddress = city + district + detail;
      toggleUI(true);
      callBackendAPI(fullAddress); 
    }

    function startSearchGPS() {
      if (isLineApp) {
        alert('【功能受限】請切換至 Chrome/Safari 瀏覽器以使用定位功能。');
        return; 
      }
      if (navigator.geolocation) {
        toggleUI(true);
        navigator.geolocation.getCurrentPosition(
          (position) => callBackendAPI({ lat: position.coords.latitude, lng: position.coords.longitude }),
          (error) => {
            toggleUI(false);
            document.getElementById('bottomAd').style.display = 'block'; 
            alert('無法取得定位，請改用手動輸入。');
          },
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
      } else {
        alert("您的裝置不支援定位功能。");
      }
    }

    function showResults(data) {
      toggleUI(false);
      let html = '';
      const countSpan = document.getElementById('totalSearchCount');
      if (countSpan.innerText !== '...') {
         const currentCount = parseInt(countSpan.innerText.replace(/,/g, ''));
         countSpan.innerText = (currentCount + 1).toLocaleString();
      }

      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      const targetAttr = isMobile ? '' : 'target="_blank"';

      data.forEach((item, index) => item.originalRank = index + 1);
      if (data.length >= 2) {
        const temp = data[0];
        data[0] = data[1];
        data[1] = temp;
      }

      data.forEach((item, loopIndex) => {
        const mapUrl = `https://www.google.com/maps/dir/?api=1&destination=${item.lat},${item.lng}&travelmode=motorcycle`;
        const locationHtml = item.locationDesc 
          ? `<p class="small mb-0 mt-2" style="color: #2e7d32; background-color: #e8f5e9; padding: 5px 8px; border-radius: 6px; display: inline-block;">💡 <b>位置：</b>${item.locationDesc}</p>` 
          : '';

        let boxesHtml = '';
        let hasBoxes = false;
        if (item.boxes) {
          for (const [size, rawValue] of Object.entries(item.boxes)) {
            let total = 0, used = 0, remain = '-';
            if (typeof rawValue === 'string' && rawValue.includes('/')) {
              const parts = rawValue.split('/');
              used = parseInt(parts[0], 10) || 0;    
              total = parseInt(parts[1], 10) || 0;   
              remain = (total >= used) ? (total - used) : 0; 
            } else {
              total = parseInt(rawValue, 10) || 0;
            }

            if (total > 0) {
              hasBoxes = true;
              const remainColorClass = (remain === 0) ? 'text-danger' : 'text-success';
              let displaySize = size;
              const sizeParts = size.split('x');
              if (sizeParts.length === 2) {
                const w = parseInt(sizeParts[0], 10) / 10; 
                const h = parseInt(sizeParts[1], 10) / 10;
                displaySize = `47x${w}x${h}`;
              }
              boxesHtml += `<tr><td class="size-col">${displaySize}</td><td class="fw-bold">${total}</td><td class="fw-bold ${remainColorClass}">${remain}</td></tr>`;
            }
          }
        }
        
        let tableHtml = hasBoxes ? `<table class="box-table"><thead><tr><th style="text-align: left;">尺寸(cm)</th><th>總數</th><th>剩餘</th></tr></thead><tbody>${boxesHtml}</tbody></table>` : '<div class="small text-muted text-center mt-2">暫無資料</div>';

        // 在這裡為「距離第 1 近」的卡片加上 id="rank1Card" 用於滾動追蹤
        const cardId = item.originalRank === 1 ? 'id="rank1Card"' : '';

        html += `
          <div class="result-card" ${cardId}>
            <div class="d-flex justify-content-between">
              <div class="flex-grow-1 pe-2 d-flex flex-column">
                <div>
                  <span class="badge ${item.originalRank === 1 ? 'bg-danger' : 'bg-success'} mb-2">距離第 ${item.originalRank} 近</span>
                  <h5 style="font-weight: 700;">${item.name}</h5>
                  <p class="mb-1">🛵 路程：<span class="text-danger fw-bold">${item.distanceText}</span> (約 ${item.duration})</p>
                  <p class="small text-secondary mb-0">${item.address}</p>
                  ${locationHtml}
                </div>
                <div class="mt-auto pt-3 text-secondary" style="font-size: 0.75rem;">${item.updateTime ? `🕒 更新時間：${item.updateTime}` : ''}</div>
              </div>
              <div class="box-status flex-shrink-0 shadow-sm align-self-start">
                <div class="box-status-title">格位狀態</div>
                ${tableHtml}
              </div>
            </div>
            <div class="row g-2 mt-2">
              <div class="col-6"><button class="btn btn-outline-secondary w-100" onclick="copyText('${item.address}')">複製地址</button></div>
              <div class="col-6"><a href="${mapUrl}" ${targetAttr} class="btn btn-primary w-100">開啟導航</a></div>
            </div>
          </div>
        `;

        if (loopIndex === 0) html += adBanners[0];
        else if (loopIndex === 1) html += adBanners[1];
      });
      
      document.getElementById('results').innerHTML = html;

      // 啟動「滾動至第1名」彈出問卷的偵測邏輯
      initSurveyObserver();
    }

    // --- 新增：滾動偵測邏輯 ---
    let surveyShownThisSearch = false; // 紀錄本次搜尋是否已彈出過問卷
    
    function initSurveyObserver() {
      surveyShownThisSearch = false; // 每次新搜尋都重設
      const target = document.getElementById('rank1Card');
      if (!target) return;

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          // 如果卡片出現在螢幕中，且這次搜尋還沒彈出過問卷
          if (entry.isIntersecting && !surveyShownThisSearch) {
            surveyShownThisSearch = true; // 標記已顯示
            
            // 延遲 1 秒再彈出，體驗較自然，不會一看到就跳出來
            setTimeout(() => {
              const surveyModal = new bootstrap.Modal(document.getElementById('surveyModal'));
              surveyModal.show();
            }, 1000);
            
            observer.unobserve(target); // 停止觀察，節省資源
          }
        });
      }, { threshold: 0.5 }); // 當卡片露出 50% 時觸發

      observer.observe(target);
    }

    function copyText(text) { navigator.clipboard.writeText(text).then(() => alert('地址已複製！')); }

    async function submitFeedback() {
      const name = document.getElementById('feedbackName').value.trim() || '匿名使用者';
      const message = document.getElementById('feedbackMessage').value.trim();
      const btn = document.getElementById('submitFeedbackBtn');
      if (!message) return alert('請輸入回饋內容喔！');
      btn.disabled = true;
      btn.innerHTML = '傳送中...';
      try {
        const cleanLogUrl = GAS_API_URL_LOG.replace(/\s+/g, '');
        const response = await fetch(cleanLogUrl, { method: 'POST', body: JSON.stringify({ action: 'feedback', name: name, message: message }) });
        const result = await response.json();
        if (result.status === 'success') {
          alert('感謝您的回饋！');
          bootstrap.Modal.getInstance(document.getElementById('feedbackModal')).hide();
        } else throw new Error(result.message);
      } catch (err) { alert('傳送失敗：' + err.message); } finally { btn.disabled = false; btn.innerText = '送出回饋'; }
    }

    function markSurveyDone() {}

    function submitSurvey() {
      const roleEl = document.querySelector('input[name="surveyRole"]:checked');
      const uxEl = document.querySelector('input[name="surveyUX"]:checked');
      const accEl = document.querySelector('input[name="surveyAccuracy"]:checked');

      if (!roleEl || !uxEl || !accEl) return alert('請幫我們填寫完整問卷，讓服務更好喔！');

      const role = roleEl.value;
      const ux = uxEl.value;
      const acc = accEl.value;

      bootstrap.Modal.getInstance(document.getElementById('surveyModal')).hide();
      const cleanLogUrl = GAS_API_URL_LOG.replace(/\s+/g, '');
      
      fetch(cleanLogUrl, { 
        method: 'POST', 
        body: JSON.stringify({ action: 'survey', role: role, ux: ux, accuracy: acc }) 
      }).catch(err => console.log('背景傳送失敗:', err));
    }
  </script>
