<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAS 遠端開發站</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.23.4/ace.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #editor { width: 100%; height: calc(100vh - 160px); border-radius: 8px; font-size: 14px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans">

    <nav class="bg-gray-800 p-4 border-b border-gray-700 flex justify-between items-center">
        <h1 class="text-xl font-bold text-blue-400">GAS 遠端開發站</h1>
        <div class="flex gap-2">
            <button onclick="loadProject()" class="bg-blue-600 hover:bg-blue-500 px-4 py-1 rounded text-sm transition">讀取專案</button>
            <button onclick="saveProject()" class="bg-green-600 hover:bg-green-500 px-4 py-1 rounded text-sm transition">儲存變更</button>
        </div>
    </nav>

    <div class="p-4">
        <div class="mb-4 flex flex-wrap gap-4 items-center">
            <div class="flex-1 min-w-[300px]">
                <label class="text-xs text-gray-400 block mb-1">目標 Script ID</label>
                <input type="text" id="scriptId" placeholder="請貼上你要編輯的專案 ID" class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 focus:outline-none">
            </div>
            <div id="status" class="text-sm text-gray-400">狀態：準備就緒</div>
        </div>

        <div id="editor"></div>
    </div>

    <script>
        // --- 設定區 ---
        // 確保這裡填的是你最新的 Web App 網址 (以 /exec 結尾)
        const BACKEND_URL = "https://script.google.com/macros/s/AKfycbydvLgzOzEVK-Ck_Dvm0Qkjth6k3XZTkrb9uEvc9QAr4GnfeW8DvMapZVZkcH41Gf1B6Q/exec"; 
        
        var editor = ace.edit("editor");
        editor.setTheme("ace/theme/monokai");
        editor.session.setMode("ace/mode/javascript");
        
        let currentFiles = [];

        async function loadProject() {
            const scriptId = document.getElementById('scriptId').value.trim();
            if(!scriptId) return alert("請輸入 Script ID");
            
            setStatus("正在通訊中 (Google 可能需要幾秒鐘)...", "text-blue-400");
            
            try {
                // 使用 JSONP 或 Proxy 的概念，直接 fetch GAS 網址
                // GAS 的 doGet 必須回傳可以被 Cross-Origin 接受的格式
                const response = await fetch(`${BACKEND_URL}?scriptId=${scriptId}`, {
                    method: 'GET',
                    mode: 'cors', // 嘗試 cors
                    redirect: 'follow'
                });

                if (!response.ok) throw new Error('網絡響應不正確');
                
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }

                currentFiles = data.files;
                const mainFile = currentFiles.find(f => f.name === 'Code') || currentFiles[0];
                editor.setValue(mainFile.source, -1);
                
                setStatus(`成功！目前載入：${mainFile.name}.gs`, "text-green-400");
            } catch (err) {
                setStatus(`讀取失敗：${err.message}`, "text-red-400");
                console.error("詳細錯誤細節:", err);
                alert("讀取失敗！可能原因：\n1. Web App 網址填錯\n2. 目標 Script ID 錯誤\n3. 中繼站未部署為『任何人』存取\n4. 沒在 Google Cloud 開啟 GAS API");
            }
        }

        async function saveProject() {
            const scriptId = document.getElementById('scriptId').value.trim();
            const newCode = editor.getValue();
            if(!currentFiles.length) return alert("請先讀取專案");

            setStatus("正在同步至雲端...", "text-yellow-400");

            const fileIndex = currentFiles.findIndex(f => f.name === 'Code') || 0;
            currentFiles[fileIndex].source = newCode;

            try {
                await fetch(BACKEND_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    body: JSON.stringify({
                        scriptId: scriptId,
                        files: currentFiles
                    })
                });
                
                setStatus("儲存指令已送出！請稍後刷新目標專案檢查。", "text-green-400");
            } catch (err) {
                setStatus("儲存失敗", "text-red-400");
            }
        }

        function setStatus(msg, colorClass) {
            document.getElementById('status').innerText = `狀態：${msg}`;
            document.getElementById('status').className = `text-sm ${colorClass}`;
        }
    </script>
</body>
</html>
