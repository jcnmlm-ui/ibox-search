<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAS Pro Editor 3.1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.23.4/ace.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #editor { width: 100%; height: calc(100vh - 120px); font-size: 14px; }
        .sidebar-item.active { background: rgba(59, 130, 246, 0.2); border-left: 4px solid #3b82f6; }
        .modal-overlay { display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal-overlay.active { display: flex; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans overflow-hidden">

    <nav class="bg-gray-800 p-3 border-b border-gray-700 flex justify-between items-center h-14">
        <div class="flex items-center gap-4">
            <h1 class="text-lg font-bold text-blue-400">GAS Pro Editor</h1>
            <div id="status" class="text-xs font-mono px-2 py-1 rounded bg-black text-gray-400">系統就緒</div>
        </div>
        <div class="flex gap-2">
            <button onclick="saveProject()" class="bg-green-600 hover:bg-green-500 px-3 py-1.5 rounded text-sm font-bold transition">儲存</button>
            <button onclick="deployNewVersion()" class="bg-blue-600 hover:bg-blue-500 px-3 py-1.5 rounded text-sm font-bold transition">部署新版</button>
            <button onclick="toggleProjectManager()" class="bg-gray-700 hover:bg-gray-600 px-3 py-1.5 rounded text-sm transition">管理</button>
        </div>
    </nav>

    <div class="flex h-[calc(100vh-56px)]">
        <aside class="w-48 bg-gray-800 border-r border-gray-700 flex flex-col">
            <div id="fileList" class="flex-1 overflow-y-auto"></div>
        </aside>
        <main class="flex-1 bg-gray-900 relative border-r border-gray-700">
            <div id="editor"></div>
        </main>
        <aside class="w-80 bg-gray-800 flex flex-col">
            <div id="ai-chat" class="flex-1 overflow-y-auto p-3 space-y-3 text-xs"></div>
            <div class="p-3 border-t border-gray-700">
                <textarea id="ai-input" placeholder="詢問 AI..." class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-xs outline-none h-20"></textarea>
                <button onclick="askAI()" id="ai-btn" class="w-full mt-2 bg-purple-600 py-2 rounded text-xs font-bold">詢問 AI</button>
            </div>
        </aside>
    </div>

    <!-- 管理器省略，與之前相同 -->
    <div id="projectModal" class="modal-overlay fixed inset-0 bg-black/80 p-4">
        <!-- ... 內容保持不變 ... -->
    </div>

    <script>
        let editor = ace.edit("editor");
        editor.setTheme("ace/theme/monokai");
        editor.session.setMode("ace/mode/javascript");
        let currentFiles = [], activeFileId = null, currentScriptId = "", myProjects = JSON.parse(localStorage.getItem('my_gas_projects') || '[]');
        document.getElementById('backendUrl').value = localStorage.getItem('gas_backend') || '';
        renderProjectList();

        async function loadProject(id, name) {
            const backend = document.getElementById('backendUrl').value.trim();
            localStorage.setItem('gas_backend', backend);
            currentScriptId = id;
            log(`連線至: ${name}`, "text-blue-400");
            try {
                const resp = await fetch(`${backend}?action=getFiles&scriptId=${id}`);
                const data = await resp.json();
                currentFiles = data.files;
                renderFileList();
                openFile(currentFiles.find(f => f.name === 'Code').name || currentFiles[0].name);
                log(`已就緒`, "text-green-400");
                toggleProjectManager(false);
            } catch (err) { log(`載入失敗`, "text-red-400"); }
        }

        function openFile(fileName) {
            const file = currentFiles.find(f => f.name === fileName);
            if(activeFileId) currentFiles.find(f => f.name === activeFileId).source = editor.getValue();
            activeFileId = fileName;
            editor.setValue(file.source, -1);
            renderFileList();
        }

        async function saveProject() {
            const backend = document.getElementById('backendUrl').value.trim();
            currentFiles.find(f => f.name === activeFileId).source = editor.getValue();
            log("儲存中...", "text-yellow-400");
            try {
                await fetch(backend, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "save", scriptId: currentScriptId, files: currentFiles }) });
                log("儲存成功", "text-green-400");
            } catch (err) { log("儲存失敗", "text-red-400"); }
        }

        /**
         * 呼叫後端執行部署
         */
        async function deployNewVersion() {
            if(!currentScriptId) return alert("請先載入專案");
            if(!confirm("確定要部署新版本並更新 Web App 嗎？")) return;
            
            const backend = document.getElementById('backendUrl').value.trim();
            log("正在發布新版本...", "text-blue-400");
            
            try {
                // 先執行一次儲存，確保發布的是最新代碼
                await saveProject();

                const resp = await fetch(backend, {
                    method: 'POST',
                    body: JSON.stringify({ action: "deploy", scriptId: currentScriptId })
                });
                const result = await resp.text();
                log(result, "text-green-400");
                alert(result);
            } catch (err) {
                log("部署失敗", "text-red-400");
            }
        }

        // 其餘輔助函式保持不變...
        function renderFileList() {
            document.getElementById('fileList').innerHTML = currentFiles.map(f => `
                <div onclick="openFile('${f.name}')" class="sidebar-item cursor-pointer px-4 py-2 text-xs transition ${activeFileId === f.name ? 'active text-blue-400' : 'text-gray-400'}">
                    ${f.name}
                </div>`).join('');
        }
        function log(msg, cls) {
            const el = document.getElementById('status');
            el.innerText = msg;
            el.className = `text-xs font-mono px-2 py-1 rounded bg-black ${cls}`;
        }
        function toggleProjectManager(show) {
            const modal = document.getElementById('projectModal');
            modal.style.display = (show === false || modal.style.display === 'flex') ? 'none' : 'flex';
        }
        function renderProjectList() { /* ... 同前 ... */ }
        function addProjectToList() { /* ... 同前 ... */ }
        function deleteProject(i) { /* ... 同前 ... */ }
        async function askAI() { /* ... 同前 ... */ }
    </script>
</body>
</html>
