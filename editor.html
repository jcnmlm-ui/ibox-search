<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAS 遠端開發站 2.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.23.4/ace.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #editor { width: 100%; height: calc(100vh - 120px); border-radius: 0 0 8px 8px; font-size: 14px; }
        .sidebar-item:hover { background: rgba(59, 130, 246, 0.1); }
        .sidebar-item.active { background: rgba(59, 130, 246, 0.2); border-left: 4px solid #3b82f6; }
        .is-dirty::after { content: ' *'; color: #ef4444; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
        .modal-overlay { display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal-overlay.active { display: flex; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans overflow-hidden">

    <!-- 頂部導覽列 -->
    <nav class="bg-gray-800 p-3 border-b border-gray-700 flex justify-between items-center h-14">
        <div class="flex items-center gap-4">
            <h1 class="text-lg font-bold text-blue-400">GAS Pro Editor</h1>
            <div id="status" class="text-xs font-mono px-2 py-1 rounded bg-black text-gray-400">系統就緒</div>
            <div id="dirty-indicator" class="hidden text-[10px] bg-red-900/50 text-red-400 px-2 py-0.5 rounded border border-red-800">未儲存變更</div>
        </div>
        <div class="flex gap-2">
            <button onclick="saveProject()" class="bg-green-600 hover:bg-green-500 px-4 py-1.5 rounded text-sm font-bold transition shadow-lg">儲存變更</button>
            <button onclick="toggleProjectManager()" class="bg-gray-700 hover:bg-gray-600 px-3 py-1.5 rounded text-sm transition">管理專案</button>
        </div>
    </nav>

    <div class="flex h-[calc(100vh-56px)]">
        <!-- 左側：檔案列表 -->
        <aside class="w-56 bg-gray-800 border-r border-gray-700 flex flex-col">
            <div class="p-2 text-xs font-bold text-gray-500 uppercase tracking-wider border-b border-gray-700 flex justify-between items-center">
                <span>檔案列表</span>
                <span id="file-count" class="bg-gray-700 px-1.5 rounded text-[10px]">0</span>
            </div>
            <div id="fileList" class="flex-1 overflow-y-auto p-1">
                <div class="text-center py-10 text-gray-600 text-xs italic">等待讀取...</div>
            </div>
        </aside>

        <!-- 右側：編輯區 -->
        <main class="flex-1 flex flex-col bg-gray-900 relative">
            <div id="editor-tabs" class="bg-gray-800 flex overflow-x-auto text-xs border-b border-gray-700">
                <!-- 檔案標籤 -->
            </div>
            <div id="editor"></div>
        </main>
    </div>

    <!-- 彈窗：專案管理器 -->
    <div id="projectModal" class="modal-overlay fixed inset-0 bg-black/80 p-4">
        <div class="bg-gray-800 w-full max-w-2xl rounded-xl border border-gray-700 shadow-2xl overflow-hidden">
            <div class="p-4 border-b border-gray-700 flex justify-between items-center">
                <h2 class="font-bold text-blue-400">專案管理器</h2>
                <button onclick="toggleProjectManager(false)" class="text-gray-400 hover:text-white text-xl">✕</button>
            </div>
            <div class="p-4">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-2 mb-6 bg-gray-900 p-3 rounded-lg border border-gray-700">
                    <input type="text" id="newProjName" placeholder="專案名稱" class="bg-gray-800 border border-gray-700 rounded px-2 py-1.5 text-sm outline-none">
                    <input type="text" id="newProjId" placeholder="Script ID" class="bg-gray-800 border border-gray-700 rounded px-2 py-1.5 text-sm outline-none">
                    <button onclick="addProjectToList()" class="bg-blue-600 hover:bg-blue-500 rounded text-sm py-1.5 transition">新增專案</button>
                </div>
                
                <div class="text-xs text-gray-500 mb-2 font-bold uppercase tracking-widest">我的專案清單</div>
                <div id="projectList" class="max-h-64 overflow-y-auto space-y-2"></div>

                <div class="mt-6 pt-4 border-t border-gray-700">
                    <label class="text-xs text-gray-500 block mb-1 font-bold">中繼站 Web App 網址 (/exec)</label>
                    <input type="text" id="backendUrl" placeholder="https://script.google.com/macros/s/.../exec" class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-xs outline-none focus:ring-1 focus:ring-blue-500">
                </div>
            </div>
        </div>
    </div>

    <!-- 彈窗：確認提醒 -->
    <div id="confirmModal" class="modal-overlay fixed inset-0 bg-black/80 z-[110] p-4">
        <div class="bg-gray-800 w-full max-w-sm rounded-xl border border-red-900/50 shadow-2xl p-6">
            <h3 class="text-lg font-bold text-red-400 mb-2">未儲存的變更</h3>
            <p class="text-gray-300 text-sm mb-6">目前代碼尚未儲存，切換專案將會遺失這些更動。確定要切換嗎？</p>
            <div class="flex justify-end gap-3">
                <button onclick="closeConfirmModal()" class="px-4 py-2 rounded text-sm bg-gray-700 hover:bg-gray-600">取消</button>
                <button id="confirm-proceed-btn" class="px-4 py-2 rounded text-sm bg-red-600 hover:bg-red-500 font-bold">強制切換</button>
            </div>
        </div>
    </div>

    <script>
        let editor = ace.edit("editor");
        editor.setTheme("ace/theme/monokai");
        editor.session.setMode("ace/mode/javascript");
        
        let currentFiles = []; 
        let activeFileId = null; 
        let currentScriptId = "";
        let isDirty = false;
        let myProjects = JSON.parse(localStorage.getItem('my_gas_projects') || '[]');

        document.getElementById('backendUrl').value = localStorage.getItem('gas_backend') || '';
        renderProjectList();

        // 監聽編輯器內容變動
        editor.on("input", () => {
            if (!isDirty) {
                setDirty(true);
            }
        });

        function setDirty(dirty) {
            isDirty = dirty;
            const indicator = document.getElementById('dirty-indicator');
            if (dirty) indicator.classList.remove('hidden');
            else indicator.classList.add('hidden');
        }

        async function tryLoadProject(id, name) {
            if (isDirty) {
                showConfirmModal(() => loadProject(id, name));
            } else {
                loadProject(id, name);
            }
        }

        async function loadProject(id, name) {
            const backend = document.getElementById('backendUrl').value.trim();
            if(!backend) return alert("請先填寫中繼站網址");
            
            localStorage.setItem('gas_backend', backend);
            
            // --- 確實執行清理動作 ---
            currentScriptId = id;
            currentFiles = []; 
            activeFileId = null;
            editor.setValue("// 正在抓取雲端資料...", -1);
            document.getElementById('fileList').innerHTML = `<div class="text-center py-10 text-blue-400 text-xs animate-pulse">正在讀取專案內容...</div>`;
            document.getElementById('file-count').innerText = "0";
            
            toggleProjectManager(false);
            closeConfirmModal();
            log(`連線中: ${name}...`, "text-blue-400");

            try {
                const resp = await fetch(`${backend}?scriptId=${id}`);
                const data = await resp.json();
                
                if (data.error) {
                    log(`錯誤: ${data.error}`, "text-red-400");
                    document.getElementById('fileList').innerHTML = `<div class="p-4 text-red-500 text-xs italic text-center">讀取失敗<br>${data.error}</div>`;
                    return;
                }

                currentFiles = data.files;
                document.getElementById('file-count').innerText = currentFiles.length;
                renderFileList();
                
                // 優先開啟 Code.gs
                const defaultFile = currentFiles.find(f => f.name === 'Code') || currentFiles[0];
                openFile(defaultFile.name);
                
                setDirty(false); // 讀取成功後標記為乾淨
                log(`已進入專案: ${name}`, "text-green-400");
            } catch (err) {
                log(`連線失敗`, "text-red-400");
                document.getElementById('fileList').innerHTML = `<div class="p-4 text-red-500 text-xs italic text-center text-xs">連線失敗，請檢查 API。</div>`;
            }
        }

        function openFile(fileName) {
            const file = currentFiles.find(f => f.name === fileName);
            if(!file) return;

            // 切換前將舊檔案內容存回陣列
            if(activeFileId) {
                const oldFile = currentFiles.find(f => f.name === activeFileId);
                if(oldFile) oldFile.source = editor.getValue();
            }

            activeFileId = fileName;
            editor.setValue(file.source, -1);
            
            if (file.type === 'HTML') editor.session.setMode("ace/mode/html");
            else if (file.type === 'JSON') editor.session.setMode("ace/mode/json");
            else editor.session.setMode("ace/mode/javascript");

            renderFileList();
        }

        async function saveProject() {
            const backend = document.getElementById('backendUrl').value.trim();
            if(!currentFiles.length) return alert("請先讀取專案");

            const currentFile = currentFiles.find(f => f.name === activeFileId);
            if(currentFile) currentFile.source = editor.getValue();

            log("儲存中...", "text-yellow-400");

            try {
                await fetch(backend, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ scriptId: currentScriptId, files: currentFiles })
                });
                log("已送出儲存指令", "text-green-400");
                setDirty(false); // 儲存後標記為乾淨
            } catch (err) {
                log("儲存失敗", "text-red-400");
            }
        }

        function renderFileList() {
            const listEl = document.getElementById('fileList');
            if(currentFiles.length === 0) return;

            listEl.innerHTML = currentFiles.map(f => {
                let ext = ".gs";
                let icon = "📜";
                if(f.type === 'HTML') { ext = ".html"; icon = "🌐"; }
                if(f.type === 'JSON') { ext = ".json"; icon = "⚙️"; }
                
                return `
                <div onclick="openFile('${f.name}')" class="sidebar-item cursor-pointer px-3 py-2 text-sm flex items-center gap-2 transition ${activeFileId === f.name ? 'active text-blue-400 bg-blue-900/20' : 'text-gray-400'}">
                    <span>${icon}</span>
                    <span class="truncate">${f.name}${ext}</span>
                </div>`;
            }).join('');
        }

        function renderProjectList() {
            const listEl = document.getElementById('projectList');
            if(myProjects.length === 0) {
                listEl.innerHTML = `<div class="text-center py-4 text-gray-600 text-sm italic">尚無專案紀錄</div>`;
                return;
            }
            listEl.innerHTML = myProjects.map((p, index) => `
                <div class="flex items-center gap-2 bg-gray-900/50 p-2 rounded border border-gray-700 hover:border-blue-500/50 transition">
                    <div class="flex-1 cursor-pointer" onclick="tryLoadProject('${p.id}', '${p.name}')">
                        <div class="text-sm font-bold text-blue-300">${p.name}</div>
                        <div class="text-[10px] text-gray-500 font-mono">${p.id}</div>
                    </div>
                    <button onclick="deleteProject(${index})" class="text-gray-500 hover:text-red-400 px-2 text-lg">✕</button>
                </div>
            `).join('');
        }

        function addProjectToList() {
            const name = document.getElementById('newProjName').value.trim();
            const id = document.getElementById('newProjId').value.trim();
            if(!name || !id) return alert("專案名稱與 ID 為必填");
            myProjects.push({ name, id });
            localStorage.setItem('my_gas_projects', JSON.stringify(myProjects));
            renderProjectList();
            document.getElementById('newProjName').value = "";
            document.getElementById('newProjId').value = "";
        }

        function deleteProject(index) {
            myProjects.splice(index, 1);
            localStorage.setItem('my_gas_projects', JSON.stringify(myProjects));
            renderProjectList();
        }

        function toggleProjectManager(show) {
            const modal = document.getElementById('projectModal');
            if (show === undefined) modal.classList.toggle('active');
            else show ? modal.classList.add('active') : modal.classList.remove('active');
        }

        function showConfirmModal(onProceed) {
            const modal = document.getElementById('confirmModal');
            modal.classList.add('active');
            document.getElementById('confirm-proceed-btn').onclick = onProceed;
        }

        function closeConfirmModal() {
            document.getElementById('confirmModal').classList.remove('active');
        }

        function log(msg, cls) {
            const el = document.getElementById('status');
            el.innerText = msg;
            el.className = `text-xs font-mono px-2 py-1 rounded bg-black ${cls}`;
        }
    </script>
</body>
</html>
