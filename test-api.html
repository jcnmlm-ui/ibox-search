<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Maps API 金鑰測試工具</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
  <style>
    body { background-color: #f8f9fa; padding: 20px; font-family: monospace; }
    .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
    pre { background-color: #212529; color: #00ff00; padding: 15px; border-radius: 10px; max-height: 400px; overflow-y: auto; white-space: pre-wrap; word-wrap: break-word;}
  </style>
</head>
<body>

<div class="container" style="max-width: 800px;">
  <h2 class="text-center mb-4">🛠️ Google API 金鑰單一功能測試</h2>
  
  <div class="card p-4">
    <div class="mb-3">
      <label class="form-label fw-bold">1. 貼上您的 Google Maps API Key</label>
      <input type="text" id="apiKey" class="form-control" placeholder="AIzaSy...">
    </div>
    
    <div class="mb-3">
      <label class="form-label fw-bold">2. 測試 Geocoding API (地址轉經緯度)</label>
      <div class="input-group">
        <input type="text" id="testAddress" class="form-control" value="高雄市新興區林森一路">
        <button class="btn btn-primary" onclick="testGeocoding()">測試 Geocoding</button>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label fw-bold">3. 測試 Routes API (機車導航計算)</label>
      <button class="btn btn-success w-100" onclick="testRoutes()">測試 Routes API</button>
    </div>
  </div>

  <div class="card p-4">
    <h5 class="fw-bold">📡 測試結果 (請看 errorMessage 說明)：</h5>
    <pre id="resultLog">等待測試中...</pre>
  </div>
</div>

<script>
  function logResult(title, data) {
    const logBox = document.getElementById('resultLog');
    logBox.innerText = `[${title}]\n\n` + JSON.stringify(data, null, 2);
  }

  async function testGeocoding() {
    const key = document.getElementById('apiKey').value.trim();
    const address = document.getElementById('testAddress').value.trim();
    if (!key) return alert("請先輸入 API Key！");
    
    document.getElementById('resultLog').innerText = "連線 Geocoding API 中...";
    const url = `https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(address)}&key=${key}`;
    
    try {
      const res = await fetch(url);
      const data = await res.json();
      logResult("Geocoding API 回應", data);
    } catch (e) {
      logResult("Geocoding 發生錯誤", { error: e.message });
    }
  }

  async function testRoutes() {
    const key = document.getElementById('apiKey').value.trim();
    if (!key) return alert("請先輸入 API Key！");
    
    document.getElementById('resultLog').innerText = "連線 Routes API 中...";
    const url = `https://routes.googleapis.com/distanceMatrix/v2:computeRouteMatrix`;
    
    // 模擬從高雄火車站騎車到某個經緯度
    const payload = {
      "origins": [{ "waypoint": { "location": { "latLng": { "latitude": 22.63976, "longitude": 120.30255 } } } }],
      "destinations": [{ "waypoint": { "location": { "latLng": { "latitude": 22.645, "longitude": 120.315 } } } }],
      "travelMode": "TWO_WHEELER", 
      "routingPreference": "TRAFFIC_AWARE"
    };

    try {
      const res = await fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Goog-Api-Key': key,
          'X-Goog-FieldMask': '*'
        },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      logResult("Routes API 回應", data);
    } catch (e) {
      logResult("Routes 發生錯誤", { error: e.message });
    }
  }
</script>

</body>
</html>
